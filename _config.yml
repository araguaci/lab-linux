title: Lab Linux
description: Documentação completa sobre Linux, Docker, WSL e infraestrutura
theme: jekyll-theme-minimal
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# Configurações adicionais
markdown: kramdown
source: .
baseurl: /lab-linux

# Índice e páginas de conteúdo
defaults:
  - scope:
      path: "docs"
    values:
      layout: default
  - scope:
      path: "docs/**/*.md"
      exclude:
        - "docs/**/index.md"
        - "docs/**/README.md"
    values:
      layout: default
      permalink: /:path.html

# Incluir arquivos markdown
include:
  - docs

# Excluir arquivos desnecessários
exclude:
  - .git
  - .gitignore
  - .nojekyll
  - Gemfile
  - Gemfile.lock
  - README.md
  - STRUCTURE.md
  - configs
  - vendor
