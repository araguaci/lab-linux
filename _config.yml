title: Lab Linux
description: Documentação completa sobre Linux, Docker, WSL e infraestrutura
theme: jekyll-theme-minimal
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# Configurações adicionais
markdown: kramdown
source: .
baseurl: /lab-linux

# Defaults for all markdown files
defaults:
  - scope:
      path: "docs"
    values:
      layout: default
  - scope:
      path: "docs/index.md"
    values:
      permalink: /docs/index.html
  - scope:
      path: "docs/*/index.md"
    values:
      permalink: /:dir/index.html

# Incluir arquivos markdown
include:
  - docs

# Excluir arquivos desnecessários
exclude:
  - .git
  - .gitignore
  - .nojekyll
  - Gemfile
  - Gemfile.lock
  - README.md
  - STRUCTURE.md
  - configs
  - vendor
