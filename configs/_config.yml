title: Lab Linux
description: Documentação completa sobre Linux, Docker, WSL e infraestrutura
theme: jekyll-theme-minimal
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# Configurações adicionais
markdown: kramdown
permalink: /:categories/:title/

# Diretório de documentação
source: .

# Página de índice customizada
defaults:
  - scope:
      path: "docs"
    values:
      layout: default

# Front matter defaults para posts
front_matter_defaults:
  - scope:
      path: "docs/**"
    values:
      layout: default

# Incluir arquivos markdown
include:
  - docs
